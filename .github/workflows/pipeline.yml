name: gym-integration-frontend — Docker Hub

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

concurrency:
  group: gym-integration-frontend-docker-${{ github.workflow }}-${{ github.event.pull_request.base.ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  build-push:
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/development'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      DOCKER_IMAGE: luanaorg/gym-integration-frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build (PR — sem push)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: gym-integration-frontend:pr-check
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Helm (PR — lint + template)
        if: github.event_name == 'pull_request'
        uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      - name: helm lint & template
        if: github.event_name == 'pull_request'
        run: |
          helm lint ./helm
          helm template test-gym-integration-frontend ./helm \
            -f helm/values.yaml \
            -f helm/values-test-environment.yaml \
            --set image.repository=ci/gym-integration-frontend \
            --set image.tag=pr \
            -n test-environment > /dev/null

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata (tags)
        if: github.event_name != 'pull_request'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.DOCKER_IMAGE }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=development,enable=${{ github.ref == 'refs/heads/development' }}

      - name: Build and push
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: ssh-agent (deploy na VPS)
        if: github.event_name != 'pull_request'
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: VPS em known_hosts
        if: github.event_name != 'pull_request'
        env:
          SSH_HOST: ${{ vars.SSH_HOST }}
          SSH_PORT: ${{ vars.SSH_PORT }}
        run: |
          set -euo pipefail
          test -n "${SSH_HOST:-}" || { echo "::error::Define a variável SSH_HOST (host ou IP da VPS)."; exit 1; }
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          PORT="${SSH_PORT:-22}"
          # accept-new nos steps seguintes já confia no host; aqui só pré-popula e não pode derrubar o job
          ssh-keyscan -p "$PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Enviar chart e deploy com Helm (SSH)
        if: github.event_name != 'pull_request'
        env:
          SSH_HOST: ${{ vars.SSH_HOST }}
          SSH_USER: ${{ vars.SSH_USER }}
          SSH_PORT: ${{ vars.SSH_PORT }}
          KUBECONFIG_REMOTE: ${{ vars.SSH_KUBECONFIG }}
          DOCKER_IMAGE: ${{ env.DOCKER_IMAGE }}
        run: |
          set -euo pipefail
          test -n "${SSH_USER:-}" || { echo "::error::Define a variável SSH_USER."; exit 1; }
          PORT="${SSH_PORT:-22}"
          KCFG="${KUBECONFIG_REMOTE:-/etc/rancher/rke2/rke2.yaml}"
          REMOTE_DIR='~/gym-integration-frontend-helm-ci'
          # Mantém a sessão viva durante helm --wait (vários min); evita "Broken pipe" por NAT/firewall.
          SSH_COMMON="-p ${PORT} -o StrictHostKeyChecking=accept-new -o ServerAliveInterval=30 -o ServerAliveCountMax=24"
          RSYNC_SSH="ssh ${SSH_COMMON}"
          BRANCH="${{ github.ref_name }}"
          if [ "$BRANCH" = "main" ]; then
            TAG="latest"
            NS="prod-environment"
            RELEASE="gym-integration-frontend"
            HOST="${{ vars.PRODUCTION_GYM_FRONTEND_INGRESS_HOST }}"
            if [ -z "$HOST" ]; then
              echo "PRODUCTION_GYM_FRONTEND_INGRESS_HOST não definida."
              exit 1
            fi
          elif [ "$BRANCH" = "development" ]; then
            TAG="development"
            NS="test-environment"
            RELEASE="test-gym-integration-frontend"
          else
            echo "Branch não suportada: $BRANCH"
            exit 1
          fi
          rsync -az --delete -e "$RSYNC_SSH" ./helm/ "${SSH_USER}@${SSH_HOST}:${REMOTE_DIR}/"
          if [ "$BRANCH" = "main" ]; then
            ssh ${SSH_COMMON} "${SSH_USER}@${SSH_HOST}" "set -euo pipefail; export KUBECONFIG='${KCFG}'; cd ~/gym-integration-frontend-helm-ci && helm upgrade --install '${RELEASE}' . --namespace '${NS}' --create-namespace -f values.yaml -f values-production.yaml --set ingress.host='${HOST}' --set image.repository='${DOCKER_IMAGE}' --set image.tag='${TAG}' --wait --timeout 5m"
          else
            ssh ${SSH_COMMON} "${SSH_USER}@${SSH_HOST}" "set -euo pipefail; export KUBECONFIG='${KCFG}'; cd ~/gym-integration-frontend-helm-ci && helm upgrade --install '${RELEASE}' . --namespace '${NS}' --create-namespace -f values.yaml -f values-test-environment.yaml --set image.repository='${DOCKER_IMAGE}' --set image.tag='${TAG}' --wait --timeout 5m"
          fi
